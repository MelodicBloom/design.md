# Applies labels to PRs automatically based on title and changed files.
# Depends on .github/labeler.yml for the matching rules.
# Labels must already exist in the repository (see .github/scripts/sync-labels.ts).

name: Label

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false  # don't delete labels not in config
